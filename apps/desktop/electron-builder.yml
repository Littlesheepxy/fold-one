# 知更 macOS 打包（DMG）。签名/公证凭证见 docs/packaging-status.md。
appId: app.zhigeng.desktop
productName: 知更
directories:
  output: release
  buildResources: build

files:
  - dist/**
  - dist-electron/**
  - package.json

# 原生模块与外部 helper 必须在 asar 外才能加载/执行
asarUnpack:
  - "**/*.node"
  - "node_modules/@kutalia/whisper-node-addon/**"
  - "dist-electron/fold-calendar/**"

# 原生模块已由 rebuild:native 针对 Electron 编好，不让 builder 再重编
npmRebuild: false

mac:
  category: public.app-category.productivity
  icon: public/zhigeng-app-icon.icns
  # ponytail: 只出 arm64；Intel 用户出现再加 x64/universal（原生模块要双跑 electron-rebuild）
  target:
    - target: dmg
      arch: [arm64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: 知更需要使用麦克风进行语音输入。
    NSCalendarsUsageDescription: 知更需要访问日历以创建与读取日程。
    NSAppleEventsUsageDescription: 知更需要向其他应用发送事件以插入整理后的文本。
  # 公证：环境里有 APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID 时 electron-builder 自动公证；
  # 没有 Developer ID 证书时用 CSC_IDENTITY_AUTO_DISCOVERY=false 出未签名包
  notarize: true

dmg:
  artifactName: Zhigeng-${version}-${arch}.${ext}
