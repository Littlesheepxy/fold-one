name: Zhigeng
options:
  bundleIdPrefix: app.zhigeng
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    DEVELOPMENT_TEAM: D4NF2N957K
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: false

packages:
  ZhigengCore:
    path: .

targets:
  Zhigeng:
    type: application
    platform: iOS
    sources:
      - path: ZhigengApp
      - path: Shared
      - path: ../../prototypes/zhigeng-mobile/public/robin.png
        buildPhase: resources
      - path: ../../prototypes/zhigeng-mobile/public/brand-mist.png
        buildPhase: resources
      - path: ../../prototypes/zhigeng-mobile/public/voice-mist.png
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.zhigeng.ios
        INFOPLIST_FILE: ZhigengApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: ZhigengApp/Zhigeng.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - package: ZhigengCore
        product: ZhigengCore
      - target: ZhigengKeyboard
        embed: true
      - target: ZhigengLiveActivity
        embed: true

  ZhigengKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: ZhigengKeyboard
      - path: ../../prototypes/zhigeng-mobile/public/robin.png
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.zhigeng.ios.keyboard
        INFOPLIST_FILE: ZhigengKeyboard/Info.plist
        CODE_SIGN_ENTITLEMENTS: ZhigengKeyboard/ZhigengKeyboard.entitlements
        GENERATE_INFOPLIST_FILE: false
        SKIP_INSTALL: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
    dependencies:
      - package: ZhigengCore
        product: ZhigengCore

  ZhigengLiveActivity:
    type: app-extension
    platform: iOS
    sources:
      - path: ZhigengLiveActivity
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.zhigeng.ios.liveactivity
        INFOPLIST_FILE: ZhigengLiveActivity/Info.plist
        CODE_SIGN_ENTITLEMENTS: ZhigengLiveActivity/ZhigengLiveActivity.entitlements
        GENERATE_INFOPLIST_FILE: false
        SKIP_INSTALL: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
